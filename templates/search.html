<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMaster | تتبع حالة الجهاز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 550px; background: white; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1e3a8a; font-weight: 700; margin-bottom: 20px; }
        p.subtitle { text-align: center; color: #64748b; margin-top: -10px; margin-bottom: 25px; }
        .search-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 15px; }
        button { padding: 12px 25px; background-color: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 15px; transition: 0.3s; }
        button:hover { background-color: #059669; }
        .status-card { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; background-color: #fff; border: 1px solid #e2e8f0; }
        .status-badge { inline-size: max-content; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; background-color: #dbeafe; color: #1e40af; margin-bottom: 15px; }
        .info-row { margin-bottom: 10px; font-size: 15px; }
        .ai-zone { background: #f0fdf4; border-right: 5px solid #10b981; padding: 15px; margin-top: 15px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h1>تتبع جهازك الذكي 📱</h1>
    <p class="subtitle">أدخل رقم التذكرة لمعرفة حالة الإصلاح والتشخيص فوراً</p>
    
    <div class="search-group">
        <input type="number" id="ticketIdInput" placeholder="اكتب رقم التذكرة هنا (مثال: 1)" required>
        <button onclick="trackDevice()">بحث وتتبع</button>
    </div>

    <div id="statusCard" class="status-card">
        <div id="deviceBadge" class="status-badge">موديل الجهاز</div>
        
        <div class="info-row">
            <strong>حالة الجهاز الحالية:</strong> 
            <span id="deviceStatus" style="color: #e11d48; font-weight: bold;"></span>
        </div>
        
        <div class="ai-zone">
            <strong style="color: #14532d;">🤖 تقرير الفحص الفني الذكي (AI):</strong>
            <p id="aiReport" style="margin: 5px 0 0 0; font-size: 14px; line-height: 1.6; color: #166534;"></p>
        </div>
    </div>
</div>

<script>
    async function trackDevice() {
        const ticketId = document.getElementById('ticketIdInput').value;
        if(!ticketId) {
            alert("من فضلك أدخل رقم التذكرة أولاً");
            return;
        }

        // استدعاء مسار التتبع من السيرفر خلف الكواليس
        const response = await fetch(`/track/${ticketId}`);
        
        if(response.status === 200) {
            const data = await response.json();
            document.getElementById('deviceBadge').innerText = data.device_model;
            document.getElementById('deviceStatus').innerText = data.status;
            document.getElementById('aiReport').innerText = data.ai_diagnosis;
            document.getElementById('statusCard').style.display = 'block';
        } else {
            alert("عذراً، رقم التذكرة هذا غير موجود في النظام.");
            document.getElementById('statusCard').style.display = 'none';
        }
    }
</script>

</body>
</html>
